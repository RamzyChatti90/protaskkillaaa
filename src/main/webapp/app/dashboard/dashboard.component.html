<div class="row justify-content-center">
  <div class="col-md-10">
    <h2 class="mb-4">Dashboard de Suivi des Tâches</h2>

    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card text-center bg-primary text-white">
          <div class="card-body">
            <h5 class="card-title">Total des Tâches</h5>
            <p class="card-text display-4">{{ dashboardStats?.totalTasks | number }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center bg-success text-white">
          <div class="card-body">
            <h5 class="card-title">Tâches Terminées</h5>
            <p class="card-text display-4">{{ dashboardStats?.completedTasks | number }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center bg-warning text-dark">
          <div class="card-body">
            <h5 class="card-title">Tâches En Cours</h5>
            <p class="card-text display-4">{{ dashboardStats?.inProgressTasks | number }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body chart-container">
            <canvas #lineChart></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-body chart-container">
            <canvas #pieChart></canvas>

    <div *ngIf="isLoading" class="text-center mt-3">
      <fa-icon icon="sync" [spin]="true" size="2x"></fa-icon>
      <p>Chargement des données...</p>
    </div>
  </div>
</div>
